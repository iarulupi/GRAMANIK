<!-- FUENTE PERMANENT MARKER -->
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    
<style>
body {
    font-family: Arial;
    text-align: center;
    font-size: 30px;
}

#texto {
    width: 80%;
    height: 100px;
    font-size: 20px;
}

#resultado {
    width: 90%;
    margin: auto;
    text-align: left;
}

.palabra {
    display: inline-flex;       /* permite que varias palabras estén en línea */
    flex-direction: column;
    align-items: center;
    margin: 10px;
    max-width: 220px;           /* ancho máximo para palabras largas */
    min-width: 100px;           /* ancho mínimo para palabras cortas */
    white-space: nowrap;         /* evita que se rompa el texto */
}

.palabra img {
    width: 70px;       /* tamaño fijo de la imagen */
    height: 70px;      /* tamaño fijo de la imagen */
    object-fit: contain; 
    flex-shrink: 0;    /* evita que la imagen se estire o encoja */
}

.fila-picto {
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.fila-simbolo {
    height: 25px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.fila-texto {
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Patrick Hand', cursive;
    font-size: 26px;
}


.preposicion { 
    color: blue; 
    font-weight: bold; 
}

/* ESTILO PARA EL TÍTULO */
.titulo {
    color: #FF69B4; 
    font-family: 'Permanent Marker', sans-serif; /* Letra divertida */
    font-size: 80px; /* Tamaño grande */
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
}

.titulo img {
    width: 100px; /* Tamaño del logo */
    vertical-align: middle;
    margin-right: 15px;
}

.boton-on {
    background-color: #28a745;
    color: white;
    border: none;
}

.boton-off {
    background-color: #dc3545;
    color: red;
    border: none;
}

button {
    padding: 8px 15px;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
}

.firma {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  text-align: center;
  font-size: 12px;
  color: #000000;
  background: pink;
  padding: 6px 0;
}

.contenedor-linea {
    display: flex;           /* organiza las palabras en fila */
    flex-wrap: wrap;         /* permite saltar línea si no entra */
    align-items: flex-start; /* alinea pictogramas y texto arriba */
    gap: 15px;               /* espacio entre palabras */
    margin-bottom: 10px;     /* separación entre líneas */
}

.palabra img,
.fila-simbolo img,
.fila-picto img {
    max-width: 100%;   /* nunca más ancho que la palabra */
    height: auto;      /* mantiene la proporción original */
    object-fit: contain; /* evita que se deformen */
}

</style>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>

  </h1>

  <!-- Área de texto y botones -->
  <textarea id="texto" placeholder="Un cafecito y a seguir ♡..."></textarea>
  <br><br>

  <button onclick="descargarImagen()">Descargar imagen</button>
  <br><br>
  <button id="btnSimbolos" class="boton-on" onclick="toggleSimbolos()">Símbolos ON</button>
  <button id="btnPictos" class="boton-on" onclick="togglePictos()">Pictogramas ON</button>
  <button id="btnColor" class="boton-on" onclick="toggleColor()">Color ON</button>

  <!-- Aquí se muestran los resultados -->
  <div id="resultado"></div>

        resultado.appendChild(contenedorLinea);

    }); // fin forEach líneas
} // fin mostrarPictos
// ===== FUNCIONES BOTONES =====

function toggleSimbolos() {
    mostrarSimbolos = !mostrarSimbolos;
    document.getElementById("btnSimbolos").innerText = mostrarSimbolos ? "Símbolos ON" : "Símbolos OFF";
    mostrarPictos(); // opcional: actualiza la visualización inmediatamente
}

function togglePictos() {
    mostrarImagenes = !mostrarImagenes;
    document.getElementById("btnPictos").innerText = mostrarImagenes ? "Pictogramas ON" : "Pictogramas OFF";
    mostrarPictos();
}

function toggleColor() {
    mostrarColores = !mostrarColores;
    document.getElementById("btnColor").innerText = mostrarColores ? "Color ON" : "Color OFF";
    mostrarPictos();
}

// ===== FUNCION DESCARGAR =====

function descargarImagen() {
    html2canvas(document.getElementById("resultado"), {
        useCORS: true,
        allowTaint: false,
        backgroundColor: "#ffffff",
        scale: 2
    }).then(canvas => {
        const link = document.createElement("a");
        link.download = "gramanick.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
}

</script>
