<style>
body {
    font-family: Arial;
    text-align: center;
}

#texto {
    width: 80%;
    height: 100px;
    font-size: 20px;
}

#resultado {
    width: 90%;
    margin: auto;
    text-align: left;
}

.palabra {
    display: inline-flex;       /* permite que varias palabras estén en línea */
    flex-direction: column;
    align-items: center;
    margin: 10px;
    max-width: 220px;           /* ancho máximo para palabras largas */
    min-width: 100px;           /* ancho mínimo para palabras cortas */
    white-space: nowrap;         /* evita que se rompa el texto */
}

.palabra img {
    width: 70px;       /* tamaño fijo de la imagen */
    height: 70px;      /* tamaño fijo de la imagen */
    object-fit: contain; 
    flex-shrink: 0;    /* evita que la imagen se estire o encoja */
}

.fila-picto {
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.fila-simbolo {
    height: 25px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.fila-texto {
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
}


.preposicion { 
    color: blue; 
    font-weight: bold; 
}

/* ESTILO PARA EL TÍTULO */
.titulo {
    color: #FF69B4; 
    font-family: 'Permanent Marker', sans-serif; /* Letra divertida */
    font-size: 80px; /* Tamaño grande */
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
}

.titulo img {
    width: 100px; /* Tamaño del logo */
    vertical-align: middle;
    margin-right: 15px;
}

.boton-on {
    background-color: #28a745;
    color: white;
    border: none;
}

.boton-off {
    background-color: #dc3545;
    color: red;
    border: none;
}

button {
    padding: 8px 15px;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
}

.firma {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  text-align: center;
  font-size: 12px;
  color: #000000;
  background: pink;
  padding: 6px 0;
}

.contenedor-linea {
    display: flex;           /* organiza las palabras en fila */
    flex-wrap: wrap;         /* permite saltar línea si no entra */
    align-items: flex-start; /* alinea pictogramas y texto arriba */
    gap: 15px;               /* espacio entre palabras */
    margin-bottom: 10px;     /* separación entre líneas */
}

.palabra img,
.fila-simbolo img,
.fila-picto img {
    max-width: 100%;   /* nunca más ancho que la palabra */
    height: auto;      /* mantiene la proporción original */
    object-fit: contain; /* evita que se deformen */
}

</style>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

function esPronombre(palabra){ return pronombres.includes(palabra.toLowerCase()); }
function esRelacionante(palabra){ return relacionantes.includes(palabra.toLowerCase()); }
function esPreposicion(palabra){ return preposiciones.includes(palabra); }
function esAdjetivo(palabra){ return adjetivos.includes(palabra.toLowerCase()); }

let mostrarSimbolos = true;
let mostrarImagenes = true;
let mostrarColores = true;

// ==================== FUNCIONES ====================
function mostrarPictos() {

    const texto = document.getElementById("texto").value.toLowerCase();
    const resultado = document.getElementById("resultado");
    resultado.innerHTML = "";

    texto.split("\n").forEach(linea => {

        const contenedorLinea = document.createElement("div");
        contenedorLinea.className = "contenedor-linea"; // 
        const palabras = linea.split(" ");

        for (let i = 0; i < palabras.length; i++) {

            let palabraOriginal = palabras[i];
            let palabraAnterior = palabras[i - 1] ? palabras[i - 1].replace(/^[¡.,;:!?]+|[¿¡.,;:!?]+$/g, "") : "";
            let palabraSiguiente = palabras[i + 1] ? palabras[i + 1].replace(/^[¡.,;:!?]+|[¿¡.,;:!?]+$/g, "") : "";

            if (!palabraOriginal) continue;

            // Elimina signos de puntuación al inicio y al final
            let palabra = palabraOriginal.replace(/^[¡.,;:!?]+|[¿¡.,;:!?]+$/g, "");

            let siguienteLimpia = palabras[i+1] 
                ? palabras[i+1].replace(/^[¡.,;:!?]+|[¿¡.,;:!?]+$/g, "") 
                : "";

            // ESTRUCTURA FRASES VERBALES
            const div = document.createElement("div");
            div.className = "palabra";

            const filaPicto = document.createElement("div");
            filaPicto.className = "fila-picto";

            const filaSimbolo = document.createElement("div");
            filaSimbolo.className = "fila-simbolo";

            const filaTexto = document.createElement("div");
            filaTexto.className = "fila-texto";

            // ===== PICTOGRAMAS NORMALES =====
            if (verbosBase.includes(palabra) || verbosConjugados[palabra]) {

                if (mostrarColores) {
                    filaTexto.style.color = "red";
                    filaTexto.style.fontWeight = "bold";
                }

                // Si la palabra es verbo, buscamos el pictograma y el símbolo
                let raiz = verbosConjugados[palabra] || palabra;
                let esInfinitivo = verbosBase.includes(palabra);

                if (esInfinitivo) {
                    const imgSimbolo = document.createElement("img");
                    imgSimbolo.src = simboloVerboInfinitivo;
                    imgSimbolo.style.width = "40px";
                    imgSimbolo.style.height = "40px";

                    if (mostrarSimbolos) {
                        filaSimbolo.appendChild(imgSimbolo);
                    }

                } else {

                    if (mostrarSimbolos) {
                        filaSimbolo.innerText = "=";
                        filaSimbolo.style.color = "red";
                    }
                }

                if (pictogramas[raiz] && mostrarImagenes) {
                    const img = document.createElement("img");
                    img.src = pictogramas[raiz];
                    filaPicto.appendChild(img);
                }

            }

            // ===== PICTOGRAMAS COMPUESTOS (hasta 4 palabras) =====
            // Este bloque ha sido eliminado para evitar el comportamiento no deseado
            // Y mantener el símbolo solo sobre el verbo en frases compuestas

            // ===== ADJETIVOS =====
            if (esAdjetivo(palabra)) {

                const imgSimbolo = document.createElement("img");
                imgSimbolo.src = simboloAdjetivo;
                imgSimbolo.style.width = "40px";
                imgSimbolo.style.height = "40px";

                if (mostrarSimbolos) {
                    filaSimbolo.appendChild(imgSimbolo);
                }
            }

            // ===== PRONOMBRES =====
            if (esPronombre(palabra)) {

                const img = document.createElement("img");
                img.src = simboloPronombre;
                img.style.width = "40px";
                img.style.height = "40px";

                if (mostrarSimbolos) {
                    filaSimbolo.appendChild(img);
                }
            }

            // ===== RELACIONANTES =====
            if (esRelacionante(palabra)) {

                const img = document.createElement("img");
                img.src = simboloRelacionante;
                img.style.width = "40px";
                img.style.height = "40px";

                if (mostrarSimbolos) {
                    filaSimbolo.appendChild(img);
                }
            }

            // ===== PREPOSICIONES =====
            if (esPreposicion(palabra.toLowerCase())) {

                let esFraseVerbal =
                    palabra === "a" &&
                    (verbosBase.includes(palabraSiguiente)) &&
                    (verbosConjugados[palabraAnterior] || verbosBase.includes(palabraAnterior));

                if (mostrarColores) {

                    if (esFraseVerbal) {
                        // La "a" forma parte de frase verbal → rojo
                        filaTexto.style.color = "red";
                        filaTexto.style.fontWeight = "bold";

                        // Preposición normal → azul
                        filaTexto.style.color = "blue";
                        filaTexto.style.fontWeight = "bold";
                    }
                }
            }

            // ===== BUSCAR FRASES DE HASTA 4 PALABRAS =====
let fraseEncontrada = null;
let palabrasConsumidas = 0;

for (let longitud = 4; longitud > 0; longitud--) {

    let grupo = palabras.slice(i, i + longitud)
        .map(p => p.replace(/^[¡.,;:!?]+|[¿¡.,;:!?]+$/g, "").toLowerCase())
        .join(" ");

    if (pictogramas[grupo]) {
        fraseEncontrada = grupo;
        palabrasConsumidas = longitud;
        break;
    }
}

if (
    fraseEncontrada &&

    !(verbosBase.includes(fraseEncontrada) || verbosConjugados[fraseEncontrada])
) {

    i += palabrasConsumidas - 1;
}
            // Mostrar el texto siempre, aunque sea la última palabra

if (fraseEncontrada) {

} else {

    mostrarColores = !mostrarColores;
    document.getElementById("btnColor").innerText = mostrarColores ? "Color ON" : "Color OFF";
    mostrarPictos();
}

// ===== FUNCION DESCARGAR =====

function descargarImagen() {
    html2canvas(document.getElementById("resultado"), {
        useCORS: true,
        allowTaint: false,
        backgroundColor: "#ffffff",
        scale: 2
    }).then(canvas => {
        const link = document.createElement("a");
        link.download = "gramanick.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
}

</script>

<div id="resultado"></div>
